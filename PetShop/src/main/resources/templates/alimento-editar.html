<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar alimento | Animaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<header th:replace="plantillaBase/base :: head"></header>

<main class="admin-form-page">
    <div class="container admin-form-shell">
        <div class="admin-form-card">
            <div class="admin-form-head">
                <span class="admin-kicker">Edición</span>
                <h1>Editar alimento</h1>
                <p>Actualizá precio, stock, imagen y datos del producto.</p>
            </div>

            <div class="admin-form-body">
                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
                <form class="admin-form" th:action="@{/alimento/editar/{id}(id=${alimento.id})}" method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Marca</label><input type="text" name="marca" class="form-control" th:value="${alimento.marca}" required></div>
                        <div class="col-md-3"><label class="form-label">Cantidad (KG)</label><input type="number" name="cantidad" class="form-control" th:value="${alimento.cantidad}" min="1" required></div>
                        <div class="col-md-3"><label class="form-label">Stock</label><input type="number" name="stock" class="form-control" th:value="${alimento.stock}" min="0" required></div>
                        <div class="col-md-6"><label class="form-label">Tipo</label><select name="tipoAlimento" class="form-select"><option th:each="tipoAlimento : ${tipoAlimentos}" th:value="${tipoAlimento}" th:text="${tipoAlimento}" th:selected="${alimento.tipoAlimento == tipoAlimento}"></option></select></div>
                        <div class="col-md-6"><label class="form-label">Categoría</label><select name="animal" class="form-select" required>
                            <option value="PERROS" th:selected="${alimento.animal != null and alimento.animal.name() == 'PERROS'}">Perros</option>
                            <option value="CACHORROS" th:selected="${alimento.animal != null and alimento.animal.name() == 'CACHORROS'}">Cachorros</option>
                            <option value="GATOS" th:selected="${alimento.animal != null and alimento.animal.name() == 'GATOS'}">Gatos</option>
                            <option value="PEQUENAS_MASCOTAS" th:selected="${alimento.animal != null and alimento.animal.name() == 'PEQUENAS_MASCOTAS'}">Pequeñas mascotas</option>
                        </select></div>
                        <div class="col-md-6"><label class="form-label">Precio</label><input type="number" name="precio" class="form-control" th:value="${alimento.precio}" min="1" step="0.01" required></div>
                        <div class="col-md-6"><label class="form-label">Nueva imagen</label><input type="file" name="archivo" class="form-control" accept="image/*"><div class="upload-hint">Dejalo vacío para conservar la imagen actual.</div></div>
                        <input type="hidden" name="activo" value="true">
                    </div>
                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <button type="submit" class="btn btn-warning text-dark fw-bold px-4">Guardar cambios</button>
                        <a th:href="@{/alimento}" class="btn btn-dark px-4">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
