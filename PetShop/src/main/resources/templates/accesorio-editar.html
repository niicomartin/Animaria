<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar accesorio | Animaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<header th:replace="plantillaBase/base :: head"></header>

<main class="admin-form-page">
    <div class="container admin-form-shell">
        <div class="admin-form-card">
            <div class="admin-form-head">
                <span class="admin-kicker">Edición</span>
                <h1>Editar accesorio</h1>
                <p>Actualizá nombre, marca, stock, precio e imagen.</p>
            </div>

            <div class="admin-form-body">
                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
                <form class="admin-form" th:action="@{/accesorio/editar}" method="POST" enctype="multipart/form-data">
                    <input type="hidden" th:value="${accesorio.id}" name="id">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Nombre</label><input type="text" name="nombre" class="form-control" th:value="${accesorio.nombre}" required></div>
                        <div class="col-md-6"><label class="form-label">Marca</label><input type="text" name="marca" class="form-control" th:value="${accesorio.marca}" required></div>
                        <div class="col-md-4"><label class="form-label">Stock</label><input type="number" name="stock" class="form-control" th:value="${accesorio.stock}" min="0" required></div>
                        <div class="col-md-4"><label class="form-label">Precio</label><input type="number" name="precio" class="form-control" th:value="${accesorio.precio}" min="1" required></div>
                        <div class="col-md-4"><label class="form-label">Nueva imagen</label><input type="file" name="archivo" class="form-control" accept="image/*"></div>
                    </div>
                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <button type="submit" class="btn btn-warning text-dark fw-bold px-4">Guardar cambios</button>
                        <a th:href="@{/accesorio}" class="btn btn-dark px-4">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
