<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar sesión | Animaria</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/login.css">
    <style>
        body { background: #1e1f1f; }
        .login-shell { min-height: calc(100vh - 90px); display: flex; align-items: center; }
        .login-card { border: 0; border-radius: 22px; overflow: hidden; box-shadow: 0 18px 45px rgba(0,0,0,.35); }
        .login-side { background: linear-gradient(135deg, #ffc107, #ffdd57); color: #111; }
        .login-side img { max-height: 240px; object-fit: cover; border-radius: 18px; }
        .form-control { border-radius: 14px; padding: 12px 14px; }
        .btn-pill { border-radius: 999px; padding: 11px 18px; }
        .dev-link { word-break: break-all; font-size: .9rem; }
    </style>
</head>
<body>
<header th:replace="plantillaBase/base :: head"></header>

<main class="container login-shell py-5">
    <div class="row justify-content-center w-100">
        <div class="col-lg-9 col-xl-8">
            <div class="card login-card">
                <div class="row g-0">
                    <div class="col-md-5 login-side p-4 d-flex flex-column justify-content-center text-center">
                        <h1 class="h2 fw-bold mb-3">Bienvenido</h1>
                        <p class="mb-4">Ingresá a Animaria para comprar, ver tu carrito y consultar tu historial.</p>
                        <img src="/bien.webp" class="img-fluid" alt="Animaria">
                    </div>

                    <div class="col-md-7 p-4 p-md-5 bg-white">
                        <h2 class="fw-bold mb-2">Iniciar sesión</h2>
                        <p class="text-muted mb-4">Usá tu correo y contraseña.</p>

                        <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
                        <div th:if="${exito != null}" class="alert alert-success" th:text="${exito}"></div>
                        <div th:if="${logout != null}" class="alert alert-success" th:text="${logout}"></div>


                        <form th:action="@{/logincheck}" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" name="email" class="form-control" placeholder="tuemail@gmail.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
                            </div>

                            <button class="btn btn-warning btn-pill w-100 fw-bold" type="submit">Ingresar</button>
                        </form>

                        <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
                            <a th:href="@{/login/olvido}">Olvidé mi clave</a>
                            <a th:href="@{/registro}" class="btn btn-outline-dark btn-pill">Registrate</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
