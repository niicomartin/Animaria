<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Olvidé mi clave | Animaria</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e1f1f; }
        .box { border: 0; border-radius: 22px; box-shadow: 0 18px 45px rgba(0,0,0,.35); overflow: hidden; }
        .hero { background: linear-gradient(135deg, #ffc107, #ffdd57); }
        .form-control { border-radius: 14px; padding: 12px 14px; }
        .btn-pill { border-radius: 999px; padding: 11px 18px; }
        .dev-link { word-break: break-all; font-size: .9rem; }
    </style>
</head>
<body>
<header th:replace="plantillaBase/base :: head"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card box">
                <div class="hero text-center p-4">
                    <h1 class="h3 fw-bold mb-2">Recuperar clave</h1>
                    <p class="mb-0">Te enviamos un enlace para crear una contraseña nueva.</p>
                </div>
                <div class="card-body p-4 p-md-5 bg-white">
                    <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${exito != null}" class="alert alert-success" th:text="${exito}"></div>
                    <div th:if="${linkRecuperacion != null}" class="alert alert-warning">
                        Modo desarrollo: si el correo no llega, abrí este enlace:<br>
                        <a class="dev-link" th:href="${linkRecuperacion}" th:text="${linkRecuperacion}"></a>
                    </div>

                    <form th:action="@{/login/olvido}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" name="email" class="form-control" placeholder="tuemail@gmail.com" th:value="${email}" required>
                        </div>
                        <button type="submit" class="btn btn-warning btn-pill w-100 fw-bold">Enviar enlace</button>
                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/login}">Volver al inicio de sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
