<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar accesorio | Animaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<header th:replace="plantillaBase/base :: head"></header>

<main class="admin-form-page">
    <div class="container admin-form-shell">
        <div class="admin-form-card">
            <div class="admin-form-head">
                <span class="admin-kicker">Catálogo</span>
                <h1>Cargar accesorio</h1>
                <p>Agregá accesorios para venta con imagen, marca, stock y precio.</p>
            </div>

            <div class="admin-form-body">
                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${exito != null}" class="alert alert-success" th:text="${exito}"></div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <form class="admin-form" th:action="@{/accesorio/ingresarAccesorio}" method="POST" enctype="multipart/form-data">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" name="nombre" class="form-control" placeholder="Ej: Correa reforzada" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Marca</label>
                                    <input type="text" name="marca" class="form-control" placeholder="Ej: Animaria" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Stock</label>
                                    <input type="number" name="stock" class="form-control" placeholder="Ej: 8" min="0" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Precio</label>
                                    <input type="number" name="precio" class="form-control" placeholder="Ej: 4500" min="1" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Imagen</label>
                                    <input type="file" name="archivo" class="form-control" accept="image/*">
                                </div>
                            </div>

                            <div class="d-flex flex-wrap gap-2 mt-4">
                                <button type="submit" class="btn btn-warning text-dark fw-bold px-4">Guardar accesorio</button>
                                <a th:href="@{/admin}" class="btn btn-outline-dark px-4">Volver al panel</a>
                                <a th:href="@{/accesorio}" class="btn btn-dark px-4">Ver catálogo</a>
                            </div>
                        </form>
                    </div>

                    <div class="col-lg-4">
                        <aside class="form-side-note">
                            <span class="note-pill">Tip admin</span>
                            <h3>Mostrá el producto limpio.</h3>
                            <p>Una foto clara y un nombre directo hacen que el accesorio se entienda al toque.</p>
                        </aside>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
