<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva clave | Animaria</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e1f1f; }
        .box { border: 0; border-radius: 22px; box-shadow: 0 18px 45px rgba(0,0,0,.35); overflow: hidden; }
        .hero { background: linear-gradient(135deg, #ffc107, #ffdd57); }
        .form-control { border-radius: 14px; padding: 12px 14px; }
        .btn-pill { border-radius: 999px; padding: 11px 18px; }
    </style>
</head>
<body>
<header th:replace="plantillaBase/base :: head"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card box">
                <div class="hero text-center p-4">
                    <h1 class="h3 fw-bold mb-2">Crear nueva clave</h1>
                    <p class="mb-0">Elegí una contraseña segura para volver a ingresar.</p>
                </div>
                <div class="card-body p-4 p-md-5 bg-white">
                    <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:if="${token != null}" th:action="@{/login/restablecer}" method="POST">
                        <input type="hidden" name="token" th:value="${token}">

                        <div class="mb-3">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Repetir contraseña</label>
                            <input type="password" name="password2" class="form-control" placeholder="Repetí la contraseña" required>
                        </div>

                        <button type="submit" class="btn btn-warning btn-pill w-100 fw-bold">Guardar nueva clave</button>
                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/login}">Volver al inicio de sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
